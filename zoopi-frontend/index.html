    <!-- Manifest dinâmico para PWA -->
    <link id="app-manifest" rel="manifest" href="/manifest.webmanifest" />
    <script>
      // =====================================================
      // PWA MANIFEST ROUTER - SETS CORRECT MANIFEST PER APP
      // =====================================================
      (function() {
        try {
          var path = window.location.pathname;
          var manifestLink = document.getElementById('app-manifest');
          if (!manifestLink) return;

          // PWA app routes and their manifests
          var pwaManifests = {
            '/pwa/garcom': '/manifest-waiter.webmanifest',
            '/pwa/entregador': '/manifest-entregador.webmanifest',
            '/pwa/tablet': '/manifest-tablet.webmanifest',
            '/pwa/totem': '/manifest-totem.webmanifest',
            '/pwa/pdv': '/manifest-pdv.webmanifest',
            '/pwa/terminal': '/manifest-terminal.webmanifest'
          };

          // Find matching manifest based on path prefix
          var manifestHref = '/manifest.webmanifest'; // default
          for (var prefix in pwaManifests) {
            if (path === prefix || path.startsWith(prefix + '/')) {
              manifestHref = pwaManifests[prefix];
              break;
            }
          }

          // Also handle legacy routes that might redirect
          if (path.includes('/garcom')) {
            manifestHref = '/manifest-waiter.webmanifest';
          }

          manifestLink.setAttribute('href', manifestHref);
          console.log('[PWA-Manifest] path=' + path + ' manifest=' + manifestHref);
        } catch (e) {
          console.error('[PWA-Manifest] Error:', e);
        }
      })();
    </script>
